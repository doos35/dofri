services:
  - type: web
    name: dofri-server
    env: node
    rootDir: server
    buildCommand: npm install && npm run build
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: CLIENT_ORIGIN
        value: https://dofri-client.vercel.app
      - key: PORT
        value: 10000
      # Les 3 variables suivantes sont à renseigner manuellement dans le dashboard Render
      - key: ADMIN_USERNAME
        sync: false
      - key: ADMIN_PASSWORD
        sync: false
      - key: JWT_SECRET
        sync: false
